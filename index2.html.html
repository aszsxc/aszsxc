<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G.I. TECH. AMERICA Corp. - Customer Supply Chain Map</title>
    <!-- Tailwind CSS for modern look -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet Map JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Google Fonts for professional typography -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans KR', 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            overflow: hidden;
        }
        #map {
            width: 100vw;
            height: 100vh;
            background-color: #f8fafc;
        }
        /* Custom Leaflet styling to remove zoom control and keep it clean */
        .leaflet-control-zoom {
            border: none !important;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1) !important;
        }
        .leaflet-control-zoom-in, .leaflet-control-zoom-out {
            background-color: #ffffff !important;
            color: #1e293b !important;
            border: 1px solid #e2e8f0 !important;
            transition: all 0.2s ease;
        }
        .leaflet-control-zoom-in:hover, .leaflet-control-zoom-out:hover {
            background-color: #f1f5f9 !important;
            color: #0f172a !important;
        }
        /* Map Attrib removal for clean presentation screen */
        .leaflet-control-attribution {
            display: none !important;
        }
        /* High-quality marker designs */
        .custom-marker {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }
        .custom-marker:hover {
            transform: scale(1.15);
            z-index: 9999 !important;
        }
        /* Pulse waves for G.I. Tech Hub */
        .hub-pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(15, 23, 42, 0.15);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.2); opacity: 0; }
        }
        /* Line dash animations */
        .animated-line {
            stroke-dasharray: 8, 8;
            animation: dash 35s linear infinite;
        }
        @keyframes dash {
            to {
                stroke-dashoffset: -1000;
            }
        }
        /* Ultra-high contrast route time labels with white outlines */
        .route-time {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 0 !important;
            color: #8B1E3F !important;
            font-size: 13px !important;
            font-weight: 600 !important;
            text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff, 0 0 3px #fff !important;
            white-space: nowrap !important;
        }
        .route-time::before {
            display: none !important; /* Remove default tooltip arrow pointer */
        }
    </style>
</head>
<body>

    <!-- Dynamic Header -->
    <div class="absolute top-6 left-8 z-[1000] bg-white/95 backdrop-blur-md px-6 py-4 rounded-2xl shadow-xl border border-slate-100 max-w-lg pointer-events-auto">
        <div class="flex items-center gap-3 mb-1">
            <span class="w-3 h-3 rounded-full bg-slate-900"></span>
            <span class="text-xs font-bold text-slate-500 tracking-wider uppercase">G.I. TECH. AMERICA CORP.</span>
        </div>
        <h1 class="text-2xl font-black text-slate-900 tracking-tight leading-none mb-1.5">고객사 거리 시각화 지도</h1>
        <p class="text-xs text-slate-600 font-medium leading-relaxed">고객사 배터리 소요시간</p>
    </div>

    <!-- Interactive Filter Panel (Top Right) -->
    <div class="absolute top-6 right-8 z-[1000] bg-white/95 backdrop-blur-md px-5 py-4 rounded-2xl shadow-xl border border-slate-100 flex flex-col gap-3">
        <span class="text-xs font-extrabold text-slate-400 tracking-wider uppercase">고객사 필터</span>
        <div class="flex flex-col gap-2">
            <button onclick="filterGroup('all')" id="btn-all" class="flex items-center gap-3 px-3 py-1.5 rounded-lg bg-slate-100 text-slate-900 font-bold text-xs border border-slate-200 transition-all hover:bg-slate-200">
                <span class="w-2.5 h-2.5 rounded-full bg-slate-700"></span> 전체 보기
            </button>
            <button onclick="filterGroup('lg')" id="btn-lg" class="flex items-center gap-3 px-3 py-1.5 rounded-lg text-slate-600 font-semibold text-xs border border-transparent transition-all hover:bg-slate-50">
                <span class="w-2.5 h-2.5 rounded-full bg-[#A50034]"></span> LG Energy Solution
            </button>
            <button onclick="filterGroup('sk')" id="btn-sk" class="flex items-center gap-3 px-3 py-1.5 rounded-lg text-slate-600 font-semibold text-xs border border-transparent transition-all hover:bg-slate-50">
                <span class="w-2.5 h-2.5 rounded-full bg-[#FF5F00]"></span> SK on
            </button>
            <button onclick="filterGroup('sdi')" id="btn-sdi" class="flex items-center gap-3 px-3 py-1.5 rounded-lg text-slate-600 font-semibold text-xs border border-transparent transition-all hover:bg-slate-50">
                <span class="w-2.5 h-2.5 rounded-full bg-[#00539C]"></span> Samsung SDI
            </button>
        </div>
    </div>

    <!-- Legend (Bottom Right) -->
    <div class="absolute bottom-8 right-8 z-[1000] bg-white/95 backdrop-blur-md px-5 py-4 rounded-2xl shadow-xl border border-slate-100 w-64 pointer-events-auto">
        <span class="text-xs font-extrabold text-slate-400 tracking-wider uppercase block mb-3">지도 범례</span>
        <div class="space-y-2.5">
            <div class="flex items-center gap-3">
                <div class="w-5 h-5 bg-slate-900 border-[1.5px] border-amber-400 rounded-full flex items-center justify-center text-white font-black text-[8px]">GI</div>
                <div class="text-xs font-bold text-slate-800">G.I. TECH 본사 <span class="text-[10px] text-slate-400 font-normal">(IN)</span></div>
            </div>
            <hr class="border-slate-100">
            <div class="flex items-center gap-3">
                <div class="w-5 h-5 bg-[#A50034] rounded-full flex items-center justify-center text-white font-extrabold text-[8px]">LG</div>
                <div class="text-xs font-semibold text-slate-600">LG 에너지솔루션</div>
            </div>
            <div class="flex items-center gap-3">
                <div class="w-5 h-5 bg-[#FF5F00] rounded-full flex items-center justify-center text-white font-extrabold text-[8px]">SK</div>
                <div class="text-xs font-semibold text-slate-600">SK On</div>
            </div>
            <div class="flex items-center gap-3">
                <div class="w-5 h-5 bg-[#00539C] rounded-full flex items-center justify-center text-white font-extrabold text-[8px]">SDI</div>
                <div class="text-xs font-semibold text-slate-600">삼성 SDI</div>
            </div>
        </div>
    </div>

    <!-- Map Container -->
    <div id="map"></div>

    <script>
        // Set up the Leaflet Map with smooth performance settings
        const map = L.map('map', {
            zoomControl: true,
            minZoom: 3,
            maxZoom: 11,
            zoomSnap: 0.1,
            zoomAnimation: false
        });

        map.zoomControl.setPosition('topleft');

        // Apply Premium Clean White/Light Tile Layer (CartoDB Positron)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 20
        }).addTo(map);

        // Core Hub: G.I. TECH. AMERICA Corp.
        const giTechHub = {
            name: "G.I. TECH. AMERICA Corp.",
            address: "10089 Delaware ST, Crown Point, IN 46307",
            coords: [41.4177, -87.3648]
        };

        // All Customers with precise coordinates, compact Korean driving times, and brand identities
        const customers = [
            // --- LG ENERGY SOLUTION ---
            {
                brand: "lg",
                name: "LG Energy Solution Arizona",
                address: "335 E. Pecos RD, Queen Creek, Arizona, 85140",
                coords: [33.2486, -111.6033],
                distance: "1,718 mi",
                duration: "25시간 30분"
            },
            {
                brand: "lg",
                name: "LG Energy Solution Michigan, Inc.",
                address: "1 LG Way, Holland, MI 49423, USA",
                coords: [42.7548, -86.1012],
                distance: "141 mi",
                duration: "2시간 20분"
            },
            {
                brand: "lg",
                name: "HL-GA Battery Company LLC",
                address: "9728 Hwy 280 E, Ellabell, Georgia 31308",
                coords: [32.1158, -81.4423],
                distance: "770 mi",
                duration: "11시간 30분"
            },
            {
                brand: "lg",
                name: "L-H Battery Company, Inc",
                address: "8500 Bluegrass Blvd, Jeffersonville, OH 43128",
                coords: [39.6162, -83.5630],
                distance: "278 mi",
                duration: "4시간 30분"
            },
            {
                brand: "lg",
                name: "NextStar Energy Inc.",
                address: "1 NextStar Way, Windsor, ON N8N 0J8 Canada",
                coords: [42.3149, -83.0364],
                distance: "250 mi",
                duration: "4시간"
            },
            {
                brand: "lg",
                name: "Ultium Cells LLC - Spring Hill",
                address: "301 Donald F Ephlin Pkwy Spring Hill, TN 37174",
                coords: [35.7512, -86.9298],
                distance: "450 mi",
                duration: "6시간 30분"
            },
            {
                brand: "lg",
                name: "Ultium Cells LLC - Warren",
                address: "7400 Tod Avenue, SW, Warren, Ohio 44481",
                coords: [41.2384, -80.8198],
                distance: "350 mi",
                duration: "5시간 30분"
            },

            // --- SK ON ---
            {
                brand: "sk",
                name: "SK BATTERY AMERICA",
                address: "1760 SK Blvd, Commerce, GA 30529",
                coords: [34.2045, -83.4566],
                distance: "680 mi",
                duration: "10시간"
            },
            {
                brand: "sk",
                name: "SK on Tennessee",
                address: "2022 Battery Park Dr, Stanton, TN 38069",
                coords: [35.4645, -89.4054],
                distance: "430 mi",
                duration: "6시간 30분"
            },
            {
                brand: "sk",
                name: "HSBMA",
                address: "5098 US Highway 411, Kingston, GA 30145",
                coords: [34.2362, -84.9452],
                distance: "610 mi",
                duration: "9시간"
            },

            // --- SAMSUNG SDI ---
            {
                brand: "sdi",
                name: "Samsung SDI America (Atlantic)",
                address: "4121 N. Atlantic Blvd., Auburn Hills, MI 48326",
                coords: [42.6875, -83.2341],
                distance: "270 mi",
                duration: "4시간"
            },
            {
                brand: "sdi",
                name: "Samsung SDI America (Continental)",
                address: "50 Continental Dr. Auburn Hills, MI 48326",
                coords: [42.6789, -83.2115],
                distance: "271 mi",
                duration: "4시간"
            },
            {
                brand: "sdi",
                name: "Samsung SDI America (Kokomo)",
                address: "3655 North 1st Street, Kokomo, IN",
                coords: [40.5218, -86.1311],
                distance: "105 mi",
                duration: "1시간 50분"
            }
        ];

        // Define exact directions and offset mapping for non-overlapping permanent tooltips
        const labelConfigs = {
            "LG Energy Solution Arizona": { direction: 'left', offset: [-12, 0] },
            "LG Energy Solution Michigan, Inc.": { direction: 'top', offset: [0, -12] },
            "HL-GA Battery Company LLC": { direction: 'bottom', offset: [0, 12] },
            
            // Columbus area
            "L-H Battery Company, Inc": { direction: 'right', offset: [12, 8] },
            
            // NextStar (Windsor) -> Part of Detroit cluster. Uses 0.5px leader line to the North-East
            "NextStar Energy Inc.": {
                useLeader: true,
                leaderOffset: [0.4, 0.8], // Shifting upwards & rightwards
                direction: 'right',
                offset: [6, 0]
            },
            
            "Ultium Cells LLC - Spring Hill": { direction: 'bottom', offset: [0, 12] },
            
            // Cleveland/Pittsburgh area
            "Ultium Cells LLC - Warren": { direction: 'right', offset: [12, -4] },

            "SK BATTERY AMERICA": { direction: 'bottom', offset: [0, 12] },
            "SK on Tennessee": { direction: 'bottom', offset: [0, 12] },
            "HSBMA": { direction: 'left', offset: [-12, 0] },

            // Detroit Auburn Hills 1
            "Samsung SDI America (Atlantic)": { direction: 'top', offset: [0, -12] },
            
            // Detroit Auburn Hills 2 -> Part of Detroit cluster. Uses 0.5px leader line to the South-West
            "Samsung SDI America (Continental)": {
                useLeader: true,
                leaderOffset: [-0.4, -0.8], // Shifting downwards & leftwards
                direction: 'left',
                offset: [-6, 0]
            },
            
            "Samsung SDI America (Kokomo)": { direction: 'bottom', offset: [0, 12] }
        };

        const routeLines = [];
        const customerMarkers = [];
        const distanceLabels = [];

        const colors = {
            lg: "#A50034",
            sk: "#FF5F00",
            sdi: "#00539C"
        };

        // Render G.I. TECH Hub (IN Headquarter)
        const hubIcon = L.divIcon({
            className: 'custom-marker',
            html: `
                <div class="relative w-10 h-10 flex items-center justify-center">
                    <div class="hub-pulse"></div>
                    <div class="w-8 h-8 bg-slate-900 border-[2px] border-amber-400 rounded-full flex items-center justify-center shadow-lg text-white font-black text-[10px] z-10">GI</div>
                </div>
            `,
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });

        const hubMarker = L.marker(giTechHub.coords, { icon: hubIcon }).addTo(map);
        hubMarker.bindPopup(`
            <div class="p-2">
                <span class="text-[10px] font-bold text-amber-500 uppercase tracking-wider block">Headquarters Hub</span>
                <h3 class="text-sm font-black text-slate-800">${giTechHub.name}</h3>
                <p class="text-xs text-slate-500 mt-1">${giTechHub.address}</p>
            </div>
        `);

        // Render All Customers and Lines
        customers.forEach((cust) => {
            // 1. Shrunk Customer Marker Icon
            const iconHtml = `<div class="w-6 h-6 rounded-full flex items-center justify-center text-white font-black text-[8px] shadow-md border-2 border-white" style="background-color: ${colors[cust.brand]}">${cust.brand.toUpperCase()}</div>`;
            const custIcon = L.divIcon({
                className: 'custom-marker',
                html: iconHtml,
                iconSize: [24, 24],
                iconAnchor: [12, 12]
            });

            // 2. Add Customer Marker to map
            const marker = L.marker(cust.coords, { icon: custIcon }).addTo(map);
            marker.bindPopup(`
                <div class="p-2 min-w-[200px]">
                    <span class="text-[9px] font-bold uppercase tracking-wider block" style="color: ${colors[cust.brand]}">
                        ${cust.brand === 'lg' ? 'LG Energy Solution' : cust.brand === 'sk' ? 'SK On' : 'Samsung SDI'}
                    </span>
                    <h3 class="text-sm font-black text-slate-800 mt-0.5">${cust.name}</h3>
                    <p class="text-[11px] text-slate-500 mt-1 mb-2 leading-tight">${cust.address}</p>
                    <hr class="my-1.5 border-slate-100">
                    <div class="grid grid-cols-2 gap-1.5">
                        <div class="bg-slate-50 p-1.5 rounded text-center">
                            <span class="block text-[8px] text-slate-400 font-bold uppercase">자동차 주행 거리</span>
                            <span class="text-xs font-black text-slate-700">${cust.distance}</span>
                        </div>
                        <div class="bg-slate-50 p-1.5 rounded text-center">
                            <span class="block text-[8px] text-slate-400 font-bold uppercase">예상 시간</span>
                            <span class="text-xs font-black text-slate-700">${cust.duration}</span>
                        </div>
                    </div>
                </div>
            `);

            customerMarkers.push({ marker, brand: cust.brand });

            // 3. Draw Connecting Route (Fine dashed lines to Hub)
            const routeCoords = [giTechHub.coords, cust.coords];
            const routeLine = L.polyline(routeCoords, {
                color: colors[cust.brand],
                weight: 1.5,
                opacity: 0.7,
                dashArray: "5, 7",
                className: "animated-line"
            }).addTo(map);

            routeLine.bindPopup(`
                <div class="p-1 text-center">
                    <span class="text-xs text-slate-500 font-bold">GI Hub → ${cust.name}</span>
                    <div class="text-sm font-extrabold text-slate-800 mt-1">${cust.duration} (${cust.distance})</div>
                </div>
            `);

            routeLines.push({ line: routeLine, brand: cust.brand, name: cust.name });

            // 4. Implement High-Readability Permanent Tooltips & Custom Leader lines
            const config = labelConfigs[cust.name] || { direction: 'top', offset: [0, -12] };

            if (config.useLeader) {
                // Determine offset endpoint for leader line
                const leaderCoords = [cust.coords[0] + config.leaderOffset[0], cust.coords[1] + config.leaderOffset[1]];

                // Draw solid, ultra-thin 0.5px line from target marker to offset destination
                const leaderLine = L.polyline([cust.coords, leaderCoords], {
                    color: colors[cust.brand],
                    weight: 0.6,
                    opacity: 0.8
                }).addTo(map);

                // Invisible marker anchor for tooltip
                const dummyAnchor = L.circleMarker(leaderCoords, {
                    radius: 0,
                    opacity: 0,
                    fillOpacity: 0
                }).addTo(map);

                // Bind permanent tooltip to dummy anchor
                dummyAnchor.bindTooltip(cust.duration, {
                    permanent: true,
                    direction: config.direction,
                    offset: config.offset,
                    className: 'route-time'
                }).openTooltip();

                distanceLabels.push({
                    brand: cust.brand,
                    label: dummyAnchor,
                    leader: leaderLine
                });
            } else {
                // Bind permanent horizontal tooltip directly on the marker with custom direction/offset
                marker.bindTooltip(cust.duration, {
                    permanent: true,
                    direction: config.direction,
                    offset: config.offset,
                    className: 'route-time'
                }).openTooltip();
            }
        });

        // Auto-fit bounds on load to perfectly frame the map including Arizona & San Jose
        const bounds = L.latLngBounds([giTechHub.coords]);
        customers.forEach(cust => bounds.extend(cust.coords));
        
        // Initial setup
        map.fitBounds(bounds, { padding: [60, 60] });

        // Dynamic Filter Logic
        function filterGroup(brand) {
            const buttons = ['all', 'lg', 'sk', 'sdi'];
            buttons.forEach(btn => {
                const el = document.getElementById(`btn-${btn}`);
                if (btn === brand) {
                    el.classList.remove('text-slate-600', 'border-transparent');
                    el.classList.add('bg-slate-100', 'text-slate-900', 'font-bold', 'border-slate-200');
                } else {
                    el.classList.add('text-slate-600', 'border-transparent');
                    el.classList.remove('bg-slate-100', 'text-slate-900', 'font-bold', 'border-slate-200');
                }
            });

            // Filter Customer Markers
            customerMarkers.forEach(item => {
                if (brand === 'all' || item.brand === brand) {
                    map.addLayer(item.marker);
                } else {
                    map.removeLayer(item.marker);
                }
            });

            // Filter Route Polylines
            routeLines.forEach(item => {
                if (brand === 'all' || item.brand === brand) {
                    map.addLayer(item.line);
                } else {
                    map.removeLayer(item.line);
                }
            });

            // Filter Leaders & Dummy Anchors
            distanceLabels.forEach(item => {
                if (brand === 'all' || item.brand === brand) {
                    if (item.label) map.addLayer(item.label);
                    if (item.leader) map.addLayer(item.leader);
                } else {
                    if (item.label) map.removeLayer(item.label);
                    if (item.leader) map.removeLayer(item.leader);
                }
            });

            // Adjust map viewport positioning based on selected brand
            if (brand === 'all') {
                map.fitBounds(bounds, { padding: [60, 60] });
            } else {
                const groupBounds = L.latLngBounds([giTechHub.coords]);
                customers.forEach(cust => {
                    if (cust.brand === brand) groupBounds.extend(cust.coords);
                });
                map.fitBounds(groupBounds, { padding: [80, 80] });
            }
        }
    </script>
</body>
</html>
